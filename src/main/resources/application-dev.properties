# Development environment — local Docker PostgreSQL only
# These are local-only credentials, not used in production.
# Production credentials are injected via environment variables (see application-prod.properties).
spring.datasource.url=jdbc:postgresql://localhost:5432/fintrack_db
spring.datasource.username=Admin
spring.datasource.password=nimda
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.ignore-missing-migrations=true

# JWT — local dev secret only, not used in production
jwt.secret=fintrack-dev-secret-key-256bits-minimum
jwt.expiration=86400000
jwt.refresh-expiration=604800000
