# Production environment ? valores reais virï¿½o de variï¿½veis de ambiente
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Structured logging â€” JSON/ECS format for cloud environments (GCP, AWS, Fly.io)
logging.structured.format.console=ecs

# Server port â€” Fly.io injects PORT at runtime
server.port=${PORT:8080}

# Actuator â€” expose only health check for Fly.io monitoring
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never