# fly.toml app configuration file generated for fintrack-pro-api on 2026-04-19T19:52:59-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fintrack-pro-api'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50


[[checks]]
  name = 'health'
  type = 'http'
  port = 8080
  method = 'GET'
  path = '/actuator/health'
  interval = '30s'
  timeout = '10s'
  grace_period = '90s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
